<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mule2Azure — AI Migration Console</title>
<style>
:root{
  --bg:#0f1117;--panel:#171b26;--p2:#1e2333;--p3:#252b3d;
  --line:#2a3147;--line2:#323b56;
  --ink:#e2e8f5;--ink2:#8b96b3;--ink3:#5a6480;
  --azure:#0078d4;--azure2:#50a3e0;--mule:#00a0df;
  --exp:#6ea8fe;--proc:#b387f7;--sys:#4dd9a4;
  --ok:#4dd9a4;--warn:#f0b84a;--err:#e06b6b;--info:#6ea8fe;
  --r:10px;
  --mono:'SF Mono','Cascadia Code',ui-monospace,monospace;
  --sans:'Inter',-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
::selection{background:var(--azure);color:#fff}
code{font-family:var(--mono);font-size:11px;background:var(--p2);padding:2px 6px;border-radius:4px;color:var(--azure2)}

/* layout */
.shell{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
.sidebar{background:var(--panel);border-right:1px solid var(--line);padding:20px 16px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:18px;overflow-y:auto}
.main{min-width:0;padding:32px 40px 100px}

/* brand */
.brand{display:flex;align-items:center;gap:10px;padding-bottom:14px;border-bottom:1px solid var(--line)}
.logo{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--mule),var(--azure));display:grid;place-items:center;font-family:var(--mono);font-weight:700;font-size:11px;color:#fff;flex-shrink:0}
.brand h1{font-size:14px;font-weight:650;letter-spacing:-.01em}
.brand .bsub{font-size:10px;color:var(--ink3);font-family:var(--mono)}

/* phase nav */
.phase-nav{display:flex;flex-direction:column;gap:2px}
.phase-hd{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);padding:8px 8px 4px;margin-top:6px}
.pbtn{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;color:var(--ink2);font-size:12px;transition:all .15s;width:100%;text-align:left;cursor:pointer}
.pbtn:hover:not(.disabled){background:var(--p2);color:var(--ink)}
.pbtn.active{background:var(--p2);color:var(--ink)}
.pbtn.active .pnum{background:var(--azure);color:#fff;border-color:var(--azure)}
.pbtn.done .pnum{color:var(--ok);border-color:var(--ok)}
.pbtn.disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
.pnum{width:20px;height:20px;border-radius:5px;border:1px solid var(--line2);display:grid;place-items:center;font-family:var(--mono);font-size:9px;flex-shrink:0;transition:all .15s}
.plbl{flex:1}
.plbl .pt{font-size:12px;line-height:1.3}
.plbl .ps2{font-size:10px;color:var(--ink3);margin-top:1px}
.ai-tag{font-size:8px;padding:1px 4px;border-radius:4px;background:color-mix(in srgb,var(--proc) 20%,transparent);color:var(--proc);border:1px solid color-mix(in srgb,var(--proc) 25%,transparent);font-family:var(--mono);vertical-align:middle;margin-left:3px}
.side-foot{margin-top:auto;font-size:10px;color:var(--ink3);font-family:var(--mono);line-height:1.9;padding-top:14px;border-top:1px solid var(--line)}

/* page */
.crumb{font-family:var(--mono);font-size:10px;color:var(--ink3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:10px}
.crumb .sep{color:var(--line2);margin:0 6px}.crumb .cur{color:var(--azure2)}
h2.pt{font-size:24px;font-weight:650;letter-spacing:-.02em;margin-bottom:7px}
.ps{color:var(--ink2);font-size:13.5px;max-width:700px;margin-bottom:24px;line-height:1.6}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:20px}
.card+.card,.card+.nrow,.nrow+.card{margin-top:14px}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;font-size:12.5px;font-weight:550;transition:all .15s;white-space:nowrap}
.btn-p{background:var(--azure);color:#fff}.btn-p:hover{background:var(--azure2)}.btn-p:disabled{opacity:.4;cursor:not-allowed}
.btn-g{border:1px solid var(--line2);color:var(--ink)}.btn-g:hover{border-color:var(--azure)}
.btn-ai{background:linear-gradient(135deg,#2d1f4e,#1a2d4e);border:1px solid color-mix(in srgb,var(--proc) 40%,transparent);color:var(--ink)}.btn-ai:hover{border-color:var(--proc)}.btn-ai:disabled{opacity:.4;cursor:not-allowed}
.btn-ok{background:color-mix(in srgb,var(--ok) 15%,transparent);border:1px solid color-mix(in srgb,var(--ok) 30%,transparent);color:var(--ok)}.btn-ok:hover{background:color-mix(in srgb,var(--ok) 25%,transparent)}
.nrow{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

/* inputs */
.inp{background:var(--bg);border:1px solid var(--line2);border-radius:7px;padding:9px 13px;color:var(--ink);font-family:var(--mono);font-size:12.5px;transition:border .15s;width:100%}
.inp:focus{outline:none;border-color:var(--azure)}
.lbl{display:block;font-size:11.5px;color:var(--ink2);margin-bottom:5px;margin-top:12px}
.lbl:first-child{margin-top:0}

/* pills */
.pill{font-family:var(--mono);font-size:9.5px;padding:2px 6px;border-radius:20px;border:1px solid var(--line2);color:var(--ink2);display:inline-block}
.pill.ok{color:var(--ok);border-color:color-mix(in srgb,var(--ok) 30%,transparent);background:color-mix(in srgb,var(--ok) 8%,transparent)}
.pill.warn{color:var(--warn);border-color:color-mix(in srgb,var(--warn) 30%,transparent)}
.pill.err{color:var(--err);border-color:color-mix(in srgb,var(--err) 30%,transparent)}
.pill.exp{color:var(--exp);border-color:color-mix(in srgb,var(--exp) 30%,transparent);background:color-mix(in srgb,var(--exp) 8%,transparent)}
.pill.proc{color:var(--proc);border-color:color-mix(in srgb,var(--proc) 30%,transparent);background:color-mix(in srgb,var(--proc) 8%,transparent)}
.pill.sys{color:var(--sys);border-color:color-mix(in srgb,var(--sys) 30%,transparent);background:color-mix(in srgb,var(--sys) 8%,transparent)}
.pill.azure{color:var(--azure2);border-color:color-mix(in srgb,var(--azure2) 30%,transparent);background:color-mix(in srgb,var(--azure2) 8%,transparent)}

/* status */
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot.ok{background:var(--ok);animation:pulse 2s infinite}
.dot.warn{background:var(--warn)}
.dot.err{background:var(--err)}
.dot.idle{background:var(--ink3)}
@keyframes pulse{0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--ok) 50%,transparent)}70%{box-shadow:0 0 0 5px transparent}100%{box-shadow:0 0 0 0 transparent}}

/* progress */
.prog{height:3px;background:var(--p2);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--azure),var(--proc));transition:width .4s}

/* log */
.log{font-family:var(--mono);font-size:11.5px;line-height:1.9;background:var(--bg);border:1px solid var(--line);border-radius:7px;padding:13px;max-height:220px;overflow:auto}
.log .ok{color:var(--ok)}.log .warn{color:var(--warn)}.log .info{color:var(--info)}.log .dim{color:var(--ink3)}

/* tables */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink3);padding:8px 10px;border-bottom:1px solid var(--line);font-weight:550}
.tbl td{padding:10px 10px;border-bottom:1px solid var(--line);font-size:12px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--p2)}
.tbl .mono{font-family:var(--mono)}

/* stat grid */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.sc{background:var(--p2);border:1px solid var(--line);border-radius:7px;padding:13px}
.sc .sv{font-size:26px;font-weight:650;font-family:var(--mono);letter-spacing:-.025em}
.sc .sl{font-size:10.5px;color:var(--ink2);margin-top:3px}

/* connect cards */
.conn-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.conn-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px;transition:border .2s}
.conn-card.connected{border-color:var(--ok)}
.conn-card .cc-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.conn-card .cc-title{font-size:13px;font-weight:600}
.conn-card .cc-status{font-size:11px;display:flex;align-items:center;gap:5px}

/* score cards */
.score-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
.score-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;transition:border .15s}
.score-card.confirmed{border-color:var(--ok)}
.score-card .sc-hd{padding:11px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.score-card .sc-name{font-family:var(--mono);font-size:12.5px;font-weight:500}
.score-card .sc-body{padding:13px 14px}
.sc-field{margin-bottom:10px}
.sc-field .sf-label{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink3);margin-bottom:4px;font-weight:550}
.sc-field .sf-value{font-size:12.5px;line-height:1.5}
.sc-field textarea{width:100%;background:var(--bg);border:1px solid var(--line2);border-radius:6px;padding:8px 10px;color:var(--ink);font-family:var(--sans);font-size:12px;resize:vertical;line-height:1.5}
.sc-field textarea:focus{outline:none;border-color:var(--azure)}
.complexity-bar{height:5px;border-radius:3px;margin-top:4px}
.cx-low{background:var(--ok);width:25%}.cx-medium{background:var(--warn);width:50%}.cx-high{background:#e8a870;width:75%}.cx-critical{background:var(--err);width:100%}

/* decision cards */
.dec-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
.dec-card .dc-hd{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.dec-card .dc-name{font-family:var(--mono);font-size:13px;font-weight:500;flex:1}
.dec-field{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--line);font-size:12.5px}
.dec-field:last-child{border-bottom:none}
.dec-field .df-label{flex:0 0 160px;color:var(--ink2);font-size:11.5px}
.dec-field .df-ai{font-size:10px;padding:1px 6px;border-radius:8px;background:color-mix(in srgb,var(--proc) 15%,transparent);color:var(--proc);margin-right:6px}
.dec-field select{background:var(--bg);border:1px solid var(--line2);border-radius:6px;padding:4px 10px;color:var(--ink);font-size:12px;font-family:var(--mono)}

/* AI stream */
.aip{background:var(--panel);border:1px solid color-mix(in srgb,var(--proc) 22%,transparent);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.aip-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:color-mix(in srgb,var(--proc) 7%,transparent);border-bottom:1px solid color-mix(in srgb,var(--proc) 18%,transparent)}
.aip-hd .t{font-size:12.5px;font-weight:600;color:var(--proc)}
.aip-body{font-family:var(--mono);font-size:11px;line-height:1.8;padding:12px 14px;color:var(--ink2);min-height:44px;max-height:220px;overflow-y:auto;white-space:pre-wrap}
.cur{display:inline-block;width:6px;height:12px;background:var(--proc);animation:blink .8s step-end infinite;vertical-align:text-bottom}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* job queue */
.job-table{width:100%;border-collapse:collapse;font-size:12px}
.job-table th{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink3);padding:7px 10px;border-bottom:1px solid var(--line);text-align:left}
.job-table td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
.job-table tr:last-child td{border-bottom:none}
.job-status{display:flex;align-items:center;gap:6px}
.js-queued{color:var(--ink3)}.js-running{color:var(--azure2)}.js-done{color:var(--ok)}.js-error{color:var(--err)}
.spin{display:inline-block;animation:spin 1s linear infinite;font-size:12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* split view */
.split{display:grid;grid-template-columns:1fr 1fr;gap:13px;min-height:500px}
.pane{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);display:flex;flex-direction:column;overflow:hidden}
.pane-hd{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--line);flex-shrink:0}
.pane-hd .t{font-size:12.5px;font-weight:600}.pane-hd .s{font-size:10.5px;color:var(--ink3);font-family:var(--mono)}
.ftree{padding:6px;border-bottom:1px solid var(--line);overflow-y:auto;max-height:160px;flex-shrink:0}
.fi{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:5px;font-family:var(--mono);font-size:11px;color:var(--ink2);cursor:pointer}
.fi:hover{background:var(--p2);color:var(--ink)}.fi.active{background:var(--p2);color:var(--azure2)}
.fi .fm{margin-left:auto;font-size:8.5px;padding:1px 4px;border-radius:6px;border:1px solid var(--line);color:var(--ink3)}
.code{flex:1;background:#090c14;font-family:var(--mono);font-size:11px;line-height:1.7;padding:13px;overflow:auto;white-space:pre;color:#b8c4dc;min-height:180px}
.empty-code{color:var(--ink3);font-style:italic;white-space:normal}

/* doc view */
.doc-view{font-family:var(--mono);font-size:11.5px;line-height:1.8;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:16px;max-height:500px;overflow:auto;white-space:pre-wrap;color:var(--ink2)}

/* banners */
.banner{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:8px;font-size:12.5px;line-height:1.5}
.banner.ok{background:color-mix(in srgb,var(--ok) 9%,transparent);border:1px solid color-mix(in srgb,var(--ok) 22%,transparent);color:var(--ink)}
.banner.warn{background:color-mix(in srgb,var(--warn) 9%,transparent);border:1px solid color-mix(in srgb,var(--warn) 22%,transparent);color:var(--ink)}
.banner.ai{background:color-mix(in srgb,var(--proc) 7%,transparent);border:1px solid color-mix(in srgb,var(--proc) 22%,transparent);color:var(--ink)}
.banner.err{background:color-mix(in srgb,var(--err) 9%,transparent);border:1px solid color-mix(in srgb,var(--err) 22%,transparent);color:var(--ink)}
.banner .ic{flex-shrink:0;font-size:15px}

/* repo list */
.repo-row{display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid var(--line);cursor:pointer}
.repo-row:last-child{border-bottom:none}
.repo-row:hover{background:var(--p2);margin:0 -5px;padding-left:9px;padding-right:9px;border-radius:7px}
.rchk{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--line2);flex-shrink:0;display:grid;place-items:center;font-size:9px;transition:all .15s}
.repo-row.sel .rchk{background:var(--azure);border-color:var(--azure);color:#fff}
.rmeta{flex:1;min-width:0}.rname{font-family:var(--mono);font-size:12.5px}.rdesc{font-size:11px;color:var(--ink3);margin-top:1px}
.rbadges{display:flex;gap:5px;align-items:center;flex-shrink:0}

/* env card */
.env-card{background:var(--p2);border:1px solid var(--line);border-radius:8px;padding:11px 14px;cursor:pointer;transition:all .15s;margin-bottom:8px}
.env-card:hover{border-color:var(--azure)}.env-card.sel{border-color:var(--azure);background:color-mix(in srgb,var(--azure) 10%,transparent)}
.env-card .en{font-size:13px;font-weight:550}.env-card .et{font-size:11px;color:var(--ink3);margin-top:2px}

.hide{display:none!important}
.fade-in{animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* syntax */
.k{color:#79b8ff}.s{color:#4dd9a4}.c{color:#5a6480;font-style:italic}.n{color:#e8a870}.p{color:#b387f7}

@media(max-width:900px){
  .shell{grid-template-columns:1fr}.sidebar{position:static;height:auto}
  .main{padding:20px 14px 60px}.conn-grid{grid-template-columns:1fr}
  .sg{grid-template-columns:1fr 1fr}.split{grid-template-columns:1fr}
  .score-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="shell">
<aside class="sidebar">
  <div class="brand">
    <div class="logo">M→Az</div>
    <div><h1>Mule2Azure</h1><div class="bsub">v3 · ai migration console</div></div>
  </div>
  <nav class="phase-nav" id="phaseNav"></nav>
  <div class="side-foot">
    <div id="srvStatus" style="color:var(--warn)">⚡ checking…</div>
    <div style="color:var(--azure2)">Azure OpenAI · gpt-5-mini</div>
  </div>
</aside>
<main class="main" id="main"></main>
</div>

<script>
'use strict';

/* ════════════════════════════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════════════════════════════ */
const S = {
  phase: 0, maxPhase: 0,
  // Phase 1 — Connect
  github: { token:'', org:'', connected:false, repos:[], selected:[] },
  anypoint: { token:'', orgId:'', orgName:'', connected:false },
  env: { selected:null, environments:[] },
  // Phase 2 — Discover
  inventory: { githubProjects:[], anypointApps:[], anypointApis:[], exchangeAssets:[], discovered:false },
  // Phase 3 — Inventory + Score
  scores: {},        // { projectName: { businessDescription, complexity, ... } }
  confirmed: false,
  // Phase 4 — Decisions
  decisions: {},     // { projectName: { strategy:'A'|'B', runtime, migrationOrder, effortWeeks } }
  approved: false,
  // Phase 5 — HLD
  hld: '', lld: {},
  // Phase 6 — Artifacts
  artifacts: [],     // [{ path, body, lang, projectName, isLLM }]
  jobQueue: [],      // project names queued
  jobStatus: {},     // { name: 'queued'|'running'|'done'|'error' }
  // Phase 7 — Runbook
  runbooks: {},      // { projectName: markdown string }
  executiveReport: '',
  // Phases 8-9 — Deploy/Validate
  azureCfg: {},
  testResults: {},
  // File viewers
  _srcFiles: [], _outFiles: [],
};

const SERVER = window.location.hostname === 'localhost' ? 'http://localhost:7433' : '';

/* ════════════════════════════════════════════════════════════════════════════
   PHASES
════════════════════════════════════════════════════════════════════════════ */
const PHASES = [
  { id:0, label:'Connect',          sub:'GitHub + Anypoint + Env',  phase:'Setup' },
  { id:1, label:'Discover',         sub:'Full inventory sweep',       phase:null },
  { id:2, label:'Score inventory',  sub:'AI + human review',          phase:'Analysis', ai:true },
  { id:3, label:'Architecture',     sub:'AI decisions + approval',    phase:null, ai:true },
  { id:4, label:'Blueprint & HLD',  sub:'Design documents',           phase:'Design', ai:true },
  { id:5, label:'Generate',         sub:'AI converts everything',     phase:'Generation', ai:true },
  { id:6, label:'Migration runbook',sub:'Per-API runbook',            phase:'Deliverables', ai:true },
  { id:7, label:'Deploy',           sub:'Mocked — download artifacts',phase:'Deployment' },
  { id:8, label:'Validate',         sub:'Test endpoints',             phase:'Validation' },
];

function goPhase(n) { if(n > S.maxPhase) return; S.phase = n; render(); }
function unlockPhase(n) { if(n > S.maxPhase) S.maxPhase = n; }

function renderNav() {
  let html='', lastPhase='';
  PHASES.forEach(p => {
    if(p.phase && p.phase !== lastPhase){ html+=`<div class="phase-hd">${p.phase}</div>`; lastPhase=p.phase; }
    const act=p.id===S.phase?'active':'', done=p.id<S.phase?'done':'', dis=p.id>S.maxPhase?'disabled':'';
    html+=`<div class="pbtn ${act} ${done} ${dis}" onclick="goPhase(${p.id})">
      <span class="pnum">${p.id<S.phase?'✓':p.id+1}</span>
      <div class="plbl"><div class="pt">${p.label}${p.ai?'<span class="ai-tag">AI</span>':''}</div><div class="ps2">${p.sub}</div></div>
    </div>`;
  });
  document.getElementById('phaseNav').innerHTML = html;
}

const VIEWS = {}, BINDS = {};
function render() {
  renderNav();
  const m = document.getElementById('main');
  m.classList.remove('fade-in'); void m.offsetWidth; m.classList.add('fade-in');
  m.innerHTML = (VIEWS[S.phase] || (() => '<p style="color:var(--err)">View not found</p>'))();
  (BINDS[S.phase] || function(){})();
}

/* ════════════════════════════════════════════════════════════════════════════
   NETWORK
════════════════════════════════════════════════════════════════════════════ */
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
function dl(content, name, type){ const b=new Blob([content],{type}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=name; a.click(); }

async function api(path, body) {
  let r;
  try { r = await fetch(`${SERVER}${path}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) }); }
  catch(e) { throw new Error(`Network error: ${e.message}. Is the server running?`); }
  let data;
  try { data = await r.json(); } catch(e) { throw new Error(`Server returned non-JSON (${r.status})`); }
  if(!r.ok) throw new Error(data.error || data.message || `HTTP ${r.status}`);
  return data;
}

async function streamSSE(path, body, onChunk, onDone, onError) {
  try {
    const resp = await fetch(`${SERVER}${path}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    if(!resp.ok){ const e=await resp.json(); throw new Error(e.error||resp.statusText); }
    const reader=resp.body.getReader(); const dec=new TextDecoder(); let buf=''; let finished=false;
    const finish=()=>{ if(!finished){finished=true;onDone();} };
    while(true){
      const {done,value}=await reader.read(); if(done) break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n'); buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data:')) continue;
        try{ const d=JSON.parse(line.slice(5).trim()); if(d.text)onChunk(d.text); if(d.done)finish(); if(d.error)onError(d.error); }catch(_){}
      }
    }
    finish();
  } catch(e){ onError(e.message); }
}

async function streamToEl(path, body, elId) {
  return new Promise((res,rej) => {
    let f='';
    streamSSE(path, body,
      t=>{ f+=t; const e=document.getElementById(elId); if(e){e.innerHTML=fmtAI(f)+'<span class="cur"></span>';e.scrollTop=e.scrollHeight;} },
      ()=>{ const e=document.getElementById(elId); if(e) e.innerHTML=fmtAI(f)||'<span style="color:var(--warn)">(no response)</span>'; res(f); },
      err=>{ const e=document.getElementById(elId); if(e) e.innerHTML=`<span style="color:var(--err)">Error: ${esc(err)}</span>`; rej(new Error(err)); }
    );
  });
}

async function streamFull(path, body) {
  return new Promise((res,rej) => { let f=''; streamSSE(path,body,t=>f+=t,()=>res(f),e=>rej(new Error(e))); });
}

function fmtAI(t) {
  return esc(t)
    .replace(/(BUSINESS_DESCRIPTION|COMPLEXITY|COMPLEXITY_REASON|KEY_SIGNALS|RECOMMENDED_STRATEGY|STRATEGY_REASON|RUNTIME_TARGET|MIGRATION_ORDER|EFFORT_WEEKS|TOP_RISK|AZURE_SERVICES|STAKEHOLDER_IMPACT):/g,'<span style="color:var(--azure2);font-weight:600">$1:</span>')
    .replace(/\b(Critical|High)\b/g,'<span style="color:var(--err)">$1</span>')
    .replace(/\b(Medium)\b/g,'<span style="color:var(--warn)">$1</span>')
    .replace(/\b(Low)\b/g,'<span style="color:var(--ok)">$1</span>')
    .replace(/\b(LogicAppWithFunctions|LogicApp|FunctionApp)\b/g,'<span style="color:var(--info)">$1</span>')
    .replace(/\b(Option B|Option A)\b/g,'<span style="color:var(--proc)">$1</span>');
}

function parseScore(raw) {
  const g = k => { const m=raw.match(new RegExp(k+':\\s*(.+)')); return m?m[1].trim():''; };
  return {
    businessDescription: g('BUSINESS_DESCRIPTION'),
    complexity:          g('COMPLEXITY') || 'Medium',
    complexityReason:    g('COMPLEXITY_REASON'),
    keySignals:          g('KEY_SIGNALS'),
    stakeholderImpact:   g('STAKEHOLDER_IMPACT'),
    recommendedStrategy: g('RECOMMENDED_STRATEGY') || 'A',
    strategyReason:      g('STRATEGY_REASON'),
    runtimeTarget:       g('RUNTIME_TARGET') || 'FunctionApp',
    migrationOrder:      parseInt(g('MIGRATION_ORDER')) || 2,
    effortWeeks:         parseInt(g('EFFORT_WEEKS')) || 4,
    topRisk:             g('TOP_RISK'),
    azureServices:       g('AZURE_SERVICES'),
    raw,
  };
}

async function checkServer() {
  try {
    const r = await fetch(`${SERVER}/health`, {signal:AbortSignal.timeout(4000)});
    if(r.ok){ const d=await r.json(); document.getElementById('srvStatus').innerHTML=`<span style="color:var(--ok)">● ${d.model}</span>`; return true; }
  } catch(_) {}
  const isRender = window.location.hostname.includes('onrender.com');
  document.getElementById('srvStatus').innerHTML = isRender
    ? '<span style="color:var(--warn)">⚡ waking up…</span>'
    : '<span style="color:var(--err)">✗ run: node server.js</span>';
  if(isRender) setTimeout(checkServer, 3000);
  return false;
}

/* ════════════════════════════════════════════════════════════════════════════
   MULE XML PARSER
════════════════════════════════════════════════════════════════════════════ */
function parseFlows(xml) {
  const flows=[]; const re=/<(flow|sub-flow)\s+name="([^"]+)"[^>]*>([\s\S]*?)<\/\1>/g; let m;
  while((m=re.exec(xml))!==null){
    const kind=m[1],name=m[2],inner=m[3];
    const f={name,kind,http_path:null,http_method:null,calls:[],has_transform:false,publishes:null,
              has_error_handler:false,has_idempotency:false,connectors:[],reconnects:0,xml:m[0]};
    const lm=inner.match(/<(?:\w+:)?listener[^>]*path="([^"]+)"/); if(lm) f.http_path=lm[1];
    let cm; const cr=/<flow-ref\s+name="([^"]+)"/g; while((cm=cr.exec(inner))!==null) f.calls.push(cm[1]);
    if(/<(?:ee:)?transform/.test(inner)) f.has_transform=true;
    const pm=inner.match(/<(?:vm:)?publish[^>]*queueName="([^"]+)"/); if(pm) f.publishes=pm[1];
    if(/<error-handler/.test(inner)) f.has_error_handler=true;
    if(/os:contains|idempoten/i.test(inner)) f.has_idempotency=true;
    if(/<sap:/.test(inner)) f.connectors.push('SAP');
    if(/<salesforce:/.test(inner)) f.connectors.push('Salesforce');
    if(/<db:/.test(inner)) f.connectors.push('Database');
    f.reconnects=(inner.match(/<reconnect[^/]*/g)||[]).length;
    const nm=name.match(/^(get|post|put|patch|delete):\\(.+?):/i);
    if(nm){ f.http_method=nm[1].toUpperCase(); let p='/'+nm[2].replace(/\\/g,'/'); p=p.replace(/\(([^)]+)\)/g,'{$1}'); f.http_path=p; }
    flows.push(f);
  }
  return flows;
}

function analyseProject(name, tier, xml) {
  const flows = parseFlows(xml);
  const allConn = [...new Set(flows.flatMap(f=>f.connectors))];
  const orchFlows = flows.filter(f=>f.kind==='flow'&&f.calls.length>=2);
  return {
    name, tier, flows, xml,
    flowCount: flows.length,
    dwlCount: flows.filter(f=>f.has_transform).length,
    connectors: allConn, hasSAP: allConn.includes('SAP'),
    hasObjectStore: /os:/.test(xml), hasIdempotency: flows.some(f=>f.has_idempotency),
    hasErrorHandler: flows.some(f=>f.has_error_handler), hasBatch: /<batch:/.test(xml),
    orchFlows, orchChains: orchFlows.map(f=>f.name+'→'+f.calls.join('→')).join('|')||'none',
    endpointFlows: flows.filter(f=>f.http_path&&f.http_method),
    reconnectCount: flows.reduce((a,f)=>a+f.reconnects,0),
  };
}

function renderScoreCards() {
  return S.inventory.githubProjects.map(proj => {
    const sc = S.scores[proj.repo] || null;
    const cxColor = {Low:'var(--ok)',Medium:'var(--warn)',High:'#e8a870',Critical:'var(--err)'}[sc?.complexity||'Medium']||'var(--warn)';
    return `<div class="score-card ${S.confirmed?'confirmed':''}" id="sc-${proj.repo.replace(/[^a-z0-9]/gi,'_')}">
      <div class="sc-hd">
        <div class="sc-name">${esc(proj.repo)}</div>
        <div style="display:flex;gap:6px;align-items:center">
          ${sc?`<span class="pill" style="color:${cxColor};border-color:${cxColor}">${sc.complexity}</span>`:'<span class="pill warn">pending</span>'}
          ${sc?`<span class="pill azure">Option ${sc.recommendedStrategy}</span>`:''}
        </div>
      </div>
      <div class="sc-body">
        ${sc?`
          <div class="sc-field">
            <div class="sf-label">Business description <span style="font-size:9px;color:var(--azure2)">(edit if AI got it wrong)</span></div>
            <textarea id="desc-${proj.repo.replace(/[^a-z0-9]/gi,'_')}" rows="3" onchange="updateDesc('${proj.repo}',this.value)">${esc(sc.businessDescription)}</textarea>
          </div>
          <div class="sc-field">
            <div class="sf-label">Complexity</div>
            <div class="sf-value" style="color:${cxColor}">${sc.complexity} — ${esc(sc.complexityReason)}</div>
            <div class="complexity-bar cx-${sc.complexity.toLowerCase()}"></div>
          </div>
          <div class="sc-field">
            <div class="sf-label">Key signals</div>
            <div class="sf-value">${(sc.keySignals||'').split(',').map(s=>`<span class="pill" style="margin-right:3px">${esc(s.trim())}</span>`).join('')||'—'}</div>
          </div>
          <div class="sc-field">
            <div class="sf-label">Recommendation</div>
            <div class="sf-value">Option ${sc.recommendedStrategy} · ${esc(sc.strategyReason)}</div>
          </div>
          <div class="sc-field">
            <div class="sf-label">Top risk</div>
            <div class="sf-value" style="color:var(--warn)">${esc(sc.topRisk)}</div>
          </div>
          <div class="sc-field">
            <div class="sf-label">Effort · Consumers</div>
            <div class="sf-value">${sc.effortWeeks} weeks · ${sc.stakeholderImpact||'unknown'} consumers</div>
          </div>
        `:sc===null?`<div class="aip-body" id="aip-${proj.repo.replace(/[^a-z0-9]/gi,'_')}"><span class="cur"></span></div>`
        :`<div style="color:var(--ink3);font-size:12px">Waiting…</div>`}
      </div>
    </div>`;
  }).join('');
}

window.updateDesc = (repo, val) => { if(S.scores[repo]) S.scores[repo].businessDescription=val; };

window.runScoring = async () => {
  const btn=document.getElementById('scoreBtn'); btn.disabled=true; btn.textContent='✦ Scoring…';
  const projs = S.inventory.githubProjects;
  // Mark all as pending
  projs.forEach(p=>{ if(!S.scores[p.repo]) S.scores[p.repo]=null; });
  document.getElementById('scoreGrid').innerHTML=renderScoreCards();

  for(let i=0;i<projs.length;i++){
    const proj=projs[i];
    const k=proj.repo.replace(/[^a-z0-9]/gi,'_');
    document.getElementById('scoreProg').style.width=Math.round(i/projs.length*100)+'%';
    document.getElementById('scoreStatus').textContent=`Scoring ${i+1}/${projs.length}: ${proj.repo}`;

    const xmlFile=proj.files?.find(f=>f.type==='mule-xml');
    const ramlFile=proj.files?.find(f=>f.type==='raml');
    const dwlFiles=proj.files?.filter(f=>f.type==='dwl')||[];
    const pomFile=proj.files?.find(f=>f.type==='pom');
    const apApp=S.inventory.anypointApps.find(a=>a.name?.includes(proj.repo.replace(/-api$/,'')));
    const apApi=S.inventory.anypointApis.find(a=>a.name?.includes(proj.repo.replace(/-api$/,'')));

    try {
      const raw = await streamFull('/api/ai/score-project', {
        name: proj.repo,
        tier: proj.repo.includes('experience')?'experience':proj.repo.includes('process')?'process':'system',
        flowXml: xmlFile?.content||'',
        ramlContent: ramlFile?.content||'',
        dwlFiles: dwlFiles.map(f=>f.content),
        pomContent: pomFile?.content||'',
        anypointApp: apApp||null,
        policies: apApi?.policies||[],
        slaTiers: [],
        contracts: [],
      });
      S.scores[proj.repo] = parseScore(raw);
    } catch(e) {
      S.scores[proj.repo] = { businessDescription:'AI scoring failed — enter manually.', complexity:'Medium', complexityReason:e.message, keySignals:'', recommendedStrategy:'A', strategyReason:'', runtimeTarget:'FunctionApp', migrationOrder:2, effortWeeks:4, topRisk:'AI not available', raw:'' };
    }
    // Re-render just this card
    const card=document.getElementById(`sc-${k}`);
    if(card){ const tmp=document.createElement('div'); tmp.innerHTML=renderScoreCards(); const newCard=tmp.querySelector(`#sc-${k}`); if(newCard) card.replaceWith(newCard); }
  }
  document.getElementById('scoreProg').style.width='100%';
  document.getElementById('scoreStatus').textContent=`✓ ${projs.length} projects scored`;
  btn.textContent='✦ Re-score all'; btn.disabled=false;
  // Show confirm button
  render();
};

window.confirmInventory = () => {

  S.decisions[repo][key]=val;
};

window.approveDecisions = () => {
  // Lock in AI decisions for any project not manually overridden
  S.inventory.githubProjects.forEach(proj=>{

  const phases=[{n:1,label:'Phase 1 — System APIs',sub:'Fewest dependencies, migrate first',col:'var(--sys)'},{n:2,label:'Phase 2 — Process APIs',sub:'Business logic, hardest phase',col:'var(--proc)'},{n:3,label:'Phase 3 — Experience APIs',sub:'Consumer-facing, cut over last',col:'var(--exp)'}];

      <div style="font-size:13px;font-weight:600;color:${ph.col};margin-bottom:4px">${ph.label}</div>
      <div style="font-size:11px;color:var(--ink3);margin-bottom:8px">${ph.sub}</div>

        </div>`).join(''):`<div style="font-size:11.5px;color:var(--ink3);padding:6px 0">No projects assigned to this phase</div>`}

window.startGeneration = async () => {
  const btn=document.getElementById('genBtn'); btn.disabled=true; btn.textContent='✦ Running…';
  const projs = S.inventory.githubProjects.sort((a,b)=>(S.decisions[a.repo]?.migrationOrder||2)-(S.decisions[b.repo]?.migrationOrder||2));
  const setJobStatus = (name, status) => { S.jobStatus[name]=status; const r=document.getElementById(`job-${name.replace(/[^a-z0-9]/gi,'_')}`); if(r){ const td=r.querySelectorAll('td')[2]; if(td) td.innerHTML=`<div class="job-status js-${status}">${status==='running'?'<span class="spin">↻</span>':status==='done'?'✓':status==='error'?'✗':'○'} ${status}</div>`; } };
  const setP=n=>{ const e=document.getElementById('genProg'); if(e) e.style.width=n+'%'; };
  const setSt=t=>{ const e=document.getElementById('genStatus'); if(e) e.innerHTML=t; };

  // Process in batches of 3
  const BATCH=3;
  for(let i=0;i<projs.length;i+=BATCH){
    const batch=projs.slice(i,i+BATCH);
    await Promise.all(batch.map(async proj=>{
      setJobStatus(proj.repo,'running');
      setSt(`✦ Processing: ${proj.repo}`);
      const dec=S.decisions[proj.repo]||{strategy:'A',runtime:'FunctionApp'};
      const sc=S.scores[proj.repo]||{};
      const xmlFile=proj.files?.find(f=>f.type==='mule-xml');
      const parsed=proj.parsed||{flows:[],endpointFlows:[],dwlCount:0,orchFlows:[]};

      try {
        if(dec.strategy==='B'){
          // Option B — intent + native implementation + tests
          const intentResult = await streamFull('/api/ai/intent', {
            project:proj.repo,
            tier:proj.repo.includes('experience')?'experience':proj.repo.includes('process')?'process':'system',
            flowXml:xmlFile?.content||'',
            businessDescription:sc.businessDescription||'',
            keySignals:sc.keySignals||'',
          });
          S.artifacts.push({path:`option-b/${proj.repo}/implementation.md`,lang:'markdown',body:intentResult,projectName:proj.repo,isLLM:true,isOptionB:true});
        } else {
          // Option A — convert code
          for(const flow of (parsed.endpointFlows||[]).slice(0,5)){
            const code = await streamFull('/api/ai/convert', {task:'function', payload:{
              project:proj.repo, tier:dec.runtime,
              flow_name:flow.name, http_method:flow.http_method, http_path:flow.http_path,
              downstream_calls:flow.calls?.join(', ')||'none',
              has_transform:flow.has_transform, has_error_handler:flow.has_error_handler,
              publishes:flow.publishes, has_idempotency:flow.has_idempotency,
              reconnects:flow.reconnects, flow_xml:flow.xml||'',
            }});
            const fn=(proj.repo.replace(/-/g,'_')+'_'+flow.http_method.toLowerCase()+'_'+(flow.http_path||'root').replace(/[^a-z0-9]/gi,'_').replace(/^_|_$/g,'')).slice(0,60);
            S.artifacts.push({path:`functions/${proj.repo}/${fn}.py`,lang:'python',body:code,projectName:proj.repo,isLLM:true});
          }
        }

        // RBAC — always generate
        const rbac = await streamFull('/api/ai/convert', {task:'rbac', payload:{
          project:proj.repo, tier:proj.repo.includes('experience')?'experience':proj.repo.includes('process')?'process':'system',
          connectors:parsed.connectors?.join(',')||'HTTP',
          publishes_sb:parsed.flows?.some(f=>f.publishes)||false,
          has_object_store:parsed.hasObjectStore||false,
          has_sap:parsed.hasSAP||false, has_salesforce:false,
          runtime_target:dec.runtime,
        }});
        S.artifacts.push({path:`rbac/${proj.repo}-roles.json`,lang:'json',body:rbac,projectName:proj.repo,isLLM:true});

        // host.json + requirements.txt
        S.artifacts.push({path:`functions/${proj.repo}/host.json`,lang:'json',body:JSON.stringify({version:'2.0',extensionBundle:{id:'Microsoft.Azure.Functions.ExtensionBundle',version:'[4.*, 5.0.0)'}},null,2),projectName:proj.repo});
        const reqs=parsed.hasSAP?'azure-functions\npyrfc\nazure-identity\nazure-keyvault-secrets':parsed.hasObjectStore?'azure-functions\nazure-data-tables\nazure-servicebus\nazure-identity':'azure-functions\nrequests\nazure-identity';
        S.artifacts.push({path:`functions/${proj.repo}/requirements.txt`,lang:'text',body:reqs,projectName:proj.repo});

        setJobStatus(proj.repo,'done');
      } catch(e) {
        setJobStatus(proj.repo,'error');
        S.artifacts.push({path:`errors/${proj.repo}.txt`,lang:'text',body:`Generation error: ${e.message}`,projectName:proj.repo});
      }
    }));
    setP(Math.round((i+BATCH)/projs.length*85));
  }

  // Bicep
  setSt('Building Bicep template…');
  S.artifacts.push({path:'bicep/main.bicep',lang:'bicep',body:buildBicep(),projectName:'_infra'});
  setP(100);
  setSt(`<span style="color:var(--ok)">✓ Done — ${S.artifacts.length} files generated</span>`);
  btn.textContent='✦ Re-run'; btn.disabled=false;
  render();
};

function buildSrcTree(){
  const files=[];
  S.inventory.githubProjects.forEach(p=>{ (p.files||[]).forEach(f=>files.push({...f,repo:p.repo})); });
  S._srcFiles=files;
  document.getElementById('srcTree').innerHTML=files.map((f,i)=>`<div class="fi ${i===0?'active':''}" onclick="showSrc(${i})"><span style="font-size:9px;color:var(--ink3);margin-right:2px">▸</span>${f.repo}/${f.path.split('/').pop()}<span class="fm">${f.type}</span></div>`).join('');
  if(files.length) showSrc(0);
}

window.showSrc=i=>{ const f=S._srcFiles[i]; if(!f)return; document.getElementById('srcCode').innerHTML=esc(f.content); document.querySelectorAll('#srcTree .fi').forEach((e,j)=>e.classList.toggle('active',j===i)); };

function paintArtifacts(){
  S._outFiles=S.artifacts;
  document.getElementById('outSub').textContent=`${S.artifacts.length} files`;
  document.getElementById('outTree').innerHTML=S.artifacts.map((a,i)=>`<div class="fi" onclick="showOut(${i})"><span style="font-size:9px;color:var(--azure2);margin-right:2px">▸</span>${a.path}<span class="fm">${a.lang}</span></div>`).join('');
  if(S.artifacts.length) showOut(0);
}
window.showOut=i=>{ const a=S._outFiles[i]; if(!a)return; document.getElementById('outCode').innerHTML=hlCode(a.body,a.lang); document.querySelectorAll('#outTree .fi').forEach((e,j)=>e.classList.toggle('active',j===i)); };

function buildBicep(){
  const projs=S.inventory.githubProjects;
  return `// Mule2Azure — Bicep template
@description('Environment') param env string = 'dev'
param location string = resourceGroup().location

resource kv 'Microsoft.KeyVault/vaults@2023-07-01' = { name: 'kv-mule2azure-\${env}' location: location properties: { sku:{family:'A',name:'standard'} tenantId: subscription().tenantId enableRbacAuthorization: true } }
resource sb 'Microsoft.ServiceBus/namespaces@2022-10-01-preview' = { name: 'sb-mule2azure-\${env}' location: location sku: { name: 'Standard' } }
resource sbQ 'Microsoft.ServiceBus/namespaces/queues@2022-10-01-preview' = { parent: sb name: 'order-events' properties: { deadLetteringOnMessageExpiration: true maxDeliveryCount: 3 } }
resource sbDlqAlert 'Microsoft.Insights/metricAlerts@2018-03-01' = { name: 'dlq-depth-alert-\${env}' location: 'global' properties: { severity: 2 enabled: true scopes: [sb.id] criteria: { 'odata.type': 'Microsoft.Azure.Monitor.SingleResourceMultipleMetricCriteria' allOf: [{ name: 'DLQDepth' metricName: 'DeadletteredMessages' operator: 'GreaterThan' threshold: 0 timeAggregation: 'Maximum' }] } } }
resource sa 'Microsoft.Storage/storageAccounts@2023-01-01' = { name: 'samule2azure\${env}' location: location kind: 'StorageV2' sku: { name: 'Standard_LRS' } }
resource law 'Microsoft.OperationalInsights/workspaces@2022-10-01' = { name: 'law-mule2azure-\${env}' location: location properties: { sku: { name: 'PerGB2018' } } }
resource ai 'Microsoft.Insights/components@2020-02-02' = { name: 'ai-mule2azure-\${env}' location: location kind: 'web' properties: { Application_Type: 'web' WorkspaceResourceId: law.id } }
resource asp 'Microsoft.Web/serverfarms@2022-09-01' = { name: 'asp-mule2azure-\${env}' location: location kind: 'linux' sku: { name: 'Y1' tier: 'Dynamic' } properties: { reserved: true } }
${projs.map(p=>`resource fn_${p.repo.replace(/-/g,'_')} 'Microsoft.Web/sites@2022-09-01' = { name: 'fn-${p.repo}-\${env}' location: location kind: 'functionapp,linux' identity: { type: 'SystemAssigned' } properties: { serverFarmId: asp.id siteConfig: { pythonVersion: '3.11' appSettings: [ { name: 'APPINSIGHTS_INSTRUMENTATIONKEY' value: ai.properties.InstrumentationKey } { name: 'AzureWebJobsStorage' value: 'DefaultEndpointsProtocol=https;AccountName=\${sa.name};AccountKey=\${sa.listKeys().keys[0].value};EndpointSuffix=core.windows.net' } { name: 'SERVICEBUS_NAMESPACE' value: '\${sb.name}.servicebus.windows.net' } { name: 'KEY_VAULT_URL' value: kv.properties.vaultUri } { name: 'FUNCTIONS_WORKER_RUNTIME' value: 'python' } ] } } }`).join('\n')}`;
}

window.generateRunbook = async (repo) => {
  const proj=S.inventory.githubProjects.find(p=>p.repo===repo);
  if(!proj) return;
  const sc=S.scores[repo]||{}, dec=S.decisions[repo]||{};
  const apApi=S.inventory.anypointApis.find(a=>a.name?.includes(repo.replace(/-api$/,'')));
  const apApp=S.inventory.anypointApps.find(a=>a.name?.includes(repo.replace(/-api$/,'')));
  const projArtifacts=S.artifacts.filter(a=>a.projectName===repo).map(a=>a.path);
  try {
    S.runbooks[repo] = await streamFull('/api/ai/runbook', {
      project:{name:repo,tier:repo.includes('experience')?'experience':repo.includes('process')?'process':'system'},
      score:{businessDescription:sc.businessDescription,complexity:sc.complexity,topRisk:sc.topRisk,effortWeeks:sc.effortWeeks},
      decision:{runtime:dec.runtime,strategy:dec.strategy},
      artifacts:projArtifacts,
      policies:apApi?.policies||[],
      slaTiers:[],
      contracts:[],
      anypointApp:apApp||null,
    });
    render();
  } catch(e){ S.runbooks[repo]=`Error generating runbook: ${e.message}`; render(); }
};

window.generateAllRunbooks = async () => {
  const btn=document.getElementById('rbBtn'); btn.disabled=true; btn.textContent='✦ Generating…';
  const projs=S.inventory.githubProjects;
  for(let i=0;i<projs.length;i++){
    document.getElementById('rbProg').style.width=Math.round(i/projs.length*80)+'%';
    await generateRunbook(projs[i].repo);
  }
  // Executive report
  const totalWeeks=Object.values(S.scores).reduce((a,s)=>a+(s?.effortWeeks||0),0);
  const complexityCounts={Low:0,Medium:0,High:0,Critical:0};
  Object.values(S.scores).forEach(s=>{ if(s?.complexity) complexityCounts[s.complexity]=(complexityCounts[s.complexity]||0)+1; });
  S.executiveReport = await streamFull('/api/report', {
    summary:{totalApis:projs.length,totalFlows:Object.values(S.scores).reduce((a,_)=>a+0,0),totalWeeks,complexityBreakdown:Object.entries(complexityCounts).map(([k,v])=>`${k}:${v}`).join(' ')},
    projects:projs.map(p=>({name:p.repo,tier:p.repo.includes('experience')?'experience':p.repo.includes('process')?'process':'system'})),
    scores:S.scores, decisions:S.decisions,
  });
  document.getElementById('rbProg').style.width='100%';
  btn.textContent='✦ Regenerate all'; btn.disabled=false;
  render();
};

window.downloadAllRunbooks = () => {
  const parts=['# Mule2Azure — Complete Migration Runbook\n\n'];
  S.inventory.githubProjects.forEach(p=>{ if(S.runbooks[p.repo]) parts.push(S.runbooks[p.repo]+'\n\n---\n\n'); });
  if(S.executiveReport) parts.push('# Executive Summary\n\n'+S.executiveReport);
  dl(parts.join(''), 'mule2azure-migration-runbook.md', 'text/markdown');
};

  <div class="card">
    ${S.inventory.githubProjects.map(p=>`
      <label class="lbl">${esc(p.repo)} — base URL</label>

    <div id="valResults" style="margin-top:14px"></div>
  </div>`;

window.runValidation = async () => {
  const results={};
  for(const p of S.inventory.githubProjects){
    const urlEl=document.getElementById(`url-${p.repo.replace(/[^a-z0-9]/gi,'_')}`);
    const base=urlEl?.value.trim();
    if(!base){ results[`${p.repo}/health`]={pass:false,status:'—',detail:'URL not provided'}; continue; }
    try {
      const r=await fetch(`${base}/health`,{signal:AbortSignal.timeout(10000)});
      results[`${p.repo}/health`]={pass:r.status<400,status:r.status,detail:r.status<400?'OK':'Unexpected status'};
    } catch(e){ results[`${p.repo}/health`]={pass:false,status:'ERR',detail:e.message}; }
  }
  S.testResults=results;
  const passed=Object.values(results).filter(r=>r.pass).length, total=Object.values(results).length;
  document.getElementById('valResults').innerHTML=`
    <div class="banner ${passed===total?'ok':'warn'}">
      <div class="ic">${passed===total?'✓':'⚠'}</div>
      <div>${passed}/${total} tests passed</div>
    </div>
    <table class="tbl" style="margin-top:12px">
      <thead><tr><th>Test</th><th>Status</th><th>Detail</th></tr></thead>
      <tbody>${Object.entries(results).map(([k,v])=>`<tr><td class="mono">${esc(k)}</td><td><span class="pill ${v.pass?'ok':'err'}">${v.pass?'PASS':'FAIL'}</span></td><td style="font-size:11px;color:var(--ink3)">${esc(v.detail||'')}</td></tr>`).join('')}</tbody>
    </table>`;
};

/* ════════════════════════════════════════════════════════════════════════════
   SYNTAX HIGHLIGHT
════════════════════════════════════════════════════════════════════════════ */
function hlCode(code, lang) {
  let s = esc(code);
  if(lang==='python'){ s=s.replace(/(#[^\n]*)/g,'<span class="c">$1</span>').replace(/\b(def|return|import|from|if|else|elif|for|in|not|None|True|False|try|except|raise|class|async|await|with|as)\b/g,'<span class="k">$1</span>').replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g,'<span class="s">$1</span>'); }
  else if(lang==='json'){ s=s.replace(/("(?:[^"\\]|\\.)*")(\s*:)/g,'<span class="k">$1</span>$2').replace(/:\s*("(?:[^"\\]|\\.)*")/g,': <span class="s">$1</span>').replace(/\b(true|false|null)\b/g,'<span class="p">$1</span>'); }
  else if(lang==='bicep'){ s=s.replace(/(\/\/[^\n]*)/g,'<span class="c">$1</span>').replace(/\b(param|var|resource|output|module)\b/g,'<span class="k">$1</span>'); }
  else if(lang==='markdown'){ s=s.replace(/^(#{1,3}.+)$/gm,'<span class="k">$1</span>'); }
  return s;
}
